<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問卷調查</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 24px;
        }

        .form-card h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 1.4rem;
        }

        /* Question Block */
        .question {
            margin-bottom: 28px;
        }

        .question label {
            display: block;
            color: #444;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.05rem;
        }

        .required {
            color: #e74c3c;
        }

        /* Text Input */
        .question input[type="text"],
        .question input[type="email"],
        .question select,
        .question textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            background: white;
        }

        .question input[type="text"]:focus,
        .question input[type="email"]:focus,
        .question select:focus,
        .question textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .question textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }

        .radio-option:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.05);
        }

        .radio-option input {
            display: none;
        }

        .radio-option.selected {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }

        .radio-option input:checked + span {
            color: #667eea;
            font-weight: 600;
        }

        /* Checkboxes */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .checkbox-option {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkbox-option:hover {
            border-color: #667eea;
        }

        .checkbox-option input {
            display: none;
        }

        .checkbox-option.selected {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }

        .checkbox-option .check-icon {
            width: 18px;
            height: 18px;
            border: 2px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox-option.selected .check-icon {
            background: #667eea;
            border-color: #667eea;
        }

        .checkbox-option.selected .check-icon::after {
            content: "✓";
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        /* Star Rating */
        .star-rating {
            display: flex;
            gap: 8px;
            font-size: 2.2rem;
            cursor: pointer;
        }

        .star {
            transition: transform 0.2s;
            user-select: none;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .star.active {
            filter: drop-shadow(0 0 4px rgba(255,193,7,0.5));
        }

        .rating-text {
            color: #888;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
            font-family: inherit;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Success Message */
        .success-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-msg .emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .success-msg h3 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .success-msg p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 24px;
        }

        .reset-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        /* Info Cards */
        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .info-card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .info-card .title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .info-card .desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e8e8e8;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .form-card {
                padding: 20px;
            }
            .radio-group {
                flex-direction: column;
            }
            .radio-option {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color: #667eea; font-weight: 600;">提交中...</p>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📝 問卷調查</h1>
            <p>感謝您撥冗填寫，您的意見對我們非常重要</p>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <form id="surveyForm">

                <!-- Question 1: Name -->
                <div class="question">
                    <label>1. 您的姓名 <span class="required">*</span></label>
                    <input type="text" name="name" required placeholder="請輸入您的姓名">
                </div>

                <!-- Question 2: Email -->
                <div class="question">
                    <label>2. 電子郵件 <span class="required">*</span></label>
                    <input type="email" name="email" required placeholder="example@email.com">
                </div>

                <!-- Question 3: Age -->
                <div class="question">
                    <label>3. 您的年齡層</label>
                    <select name="age">
                        <option value="">請選擇...</option>
                        <option value="18以下">18 歲以下</option>
                        <option value="18-25">18 - 25 歲</option>
                        <option value="26-35">26 - 35 歲</option>
                        <option value="36-45">36 - 45 歲</option>
                        <option value="46-55">46 - 55 歲</option>
                        <option value="55以上">55 歲以上</option>
                    </select>
                </div>

                <!-- Question 4: Satisfaction -->
                <div class="question">
                    <label>4. 您對本服務的滿意度 <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="satisfaction" value="非常滿意" required>
                            <span>😊 非常滿意</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="satisfaction" value="滿意">
                            <span>🙂 滿意</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="satisfaction" value="普通">
                            <span>😐 普通</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="satisfaction" value="不滿意">
                            <span>😕 不滿意</span>
                        </label>
                    </div>
                </div>

                <!-- Question 5: Interests -->
                <div class="question">
                    <label>5. 您感興趣的主題（可複選）</label>
                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="科技">
                            <div class="check-icon"></div>
                            <span>💻 科技</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="設計">
                            <div class="check-icon"></div>
                            <span>🎨 設計</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="商業">
                            <div class="check-icon"></div>
                            <span>💼 商業</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="教育">
                            <div class="check-icon"></div>
                            <span>📚 教育</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="健康">
                            <div class="check-icon"></div>
                            <span>🏃 健康</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="interests" value="娛樂">
                            <div class="check-icon"></div>
                            <span>🎮 娛樂</span>
                        </label>
                    </div>
                </div>

                <!-- Question 6: Star Rating -->
                <div class="question">
                    <label>6. 整體評分</label>
                    <div class="star-rating" id="starRating">
                        <span class="star" data-value="1">☆</span>
                        <span class="star" data-value="2">☆</span>
                        <span class="star" data-value="3">☆</span>
                        <span class="star" data-value="4">☆</span>
                        <span class="star" data-value="5">☆</span>
                    </div>
                    <input type="hidden" name="rating" id="ratingInput" value="0">
                    <p class="rating-text" id="ratingText">請點擊星星評分</p>
                </div>

                <!-- Question 7: Feedback -->
                <div class="question">
                    <label>7. 其他建議或意見</label>
                    <textarea name="feedback" rows="4" placeholder="請輸入您的建議..."></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn" id="submitBtn">✅ 提交問卷</button>
            </form>

            <!-- Success Message -->
            <div class="success-msg" id="successMsg">
                <div class="emoji">🎉</div>
                <h3>提交成功！</h3>
                <p>感謝您完成問卷，您的意見對我們非常重要。</p>
                <button class="reset-btn" onclick="resetForm()">再填一份</button>
            </div>
        </div>

        <!-- Info Cards -->
        <div class="info-cards">
            <div class="info-card">
                <div class="icon">🔒</div>
                <div class="title">資料安全</div>
                <div class="desc">您的資料將受到妥善保護</div>
            </div>
            <div class="info-card">
                <div class="icon">📱</div>
                <div class="title">響應式設計</div>
                <div class="desc">任何裝置都能順暢填寫</div>
            </div>
            <div class="info-card">
                <div class="icon">⚡</div>
                <div class="title">快速提交</div>
                <div class="desc">只需幾分鐘即可完成</div>
            </div>
        </div>

        <div class="footer">
            © 2026 問卷調查系統 | 感謝您的參與
        </div>
    </div>

    <script>
        // ============================================
        // 設定區域 - 請修改以下內容
        // ============================================

        // Google Apps Script 網址（請參考下方教學取得）
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8x1pBp6htSaZ87rwjDo7ThEDbYt1BjIkbJvZW-AcL/dev/exec';

        // ============================================
        // 星星評分功能
        // ============================================
        let currentRating = 0;
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');
        const ratingText = document.getElementById('ratingText');
        const ratingLabels = ['', '⭐ 非常不滿意', '⭐⭐ 不滿意', '⭐⭐⭐ 普通', '⭐⭐⭐⭐ 滿意', '⭐⭐⭐⭐⭐ 非常滿意'];

        stars.forEach(star => {
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.value);
                ratingInput.value = currentRating;
                ratingText.textContent = ratingLabels[currentRating];
                ratingText.style.color = '#667eea';
                updateStars();
            });

            star.addEventListener('mouseenter', function() {
                const hoverValue = parseInt(this.dataset.value);
                stars.forEach((s, i) => {
                    if (i < hoverValue) {
                        s.textContent = '⭐';
                        s.classList.add('active');
                    } else {
                        s.textContent = '☆';
                        s.classList.remove('active');
                    }
                });
            });
        });

        document.getElementById('starRating').addEventListener('mouseleave', updateStars);

        function updateStars() {
            stars.forEach((star, i) => {
                if (i < currentRating) {
                    star.textContent = '⭐';
                    star.classList.add('active');
                } else {
                    star.textContent = '☆';
                    star.classList.remove('active');
                }
            });
        }

        // ============================================
        // 單選按鈕樣式
        // ============================================
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
                this.closest('.radio-option').classList.add('selected');
            });
        });

        // ============================================
        // 多選框樣式
        // ============================================
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                this.closest('.checkbox-option').classList.toggle('selected', this.checked);
            });
        });

        // ============================================
        // 表單提交
        // ============================================
        document.getElementById('surveyForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // 收集表單資料
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                age: formData.get('age') || '未填寫',
                satisfaction: formData.get('satisfaction'),
                interests: Array.from(document.querySelectorAll('input[name="interests"]:checked')).map(cb => cb.value).join(', ') || '未選擇',
                rating: formData.get('rating'),
                feedback: formData.get('feedback') || '未填寫',
                timestamp: new Date().toLocaleString('zh-TW')
            };

            // 顯示載入中
            loadingOverlay.classList.add('active');
            submitBtn.disabled = true;

            try {
                // 如果有設定 Google Script URL，就發送資料
                if (GOOGLE_SCRIPT_URL !== 'YOUR_GOOGLE_SCRIPT_URL_HERE') {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                }

                // 成功處理
                loadingOverlay.classList.remove('active');
                document.getElementById('surveyForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';

            } catch (error) {
                console.error('提交失敗:', error);
                loadingOverlay.classList.remove('active');
                submitBtn.disabled = false;
                alert('提交失敗，請稍後再試。');
            }
        });

        // ============================================
        // 重置表單
        // ============================================
        function resetForm() {
            document.getElementById('surveyForm').reset();
            document.getElementById('surveyForm').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;

            // 重置星星
            currentRating = 0;
            ratingInput.value = '0';
            ratingText.textContent = '請點擊星星評分';
            ratingText.style.color = '#888';
            updateStars();

            // 重置樣式
            document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.checkbox-option').forEach(opt => opt.classList.remove('selected'));
        }
    </script>
</body>
</html>
